name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      # 有 Secret → 用你的 release keystore（簽名固定，可覆蓋安裝）
      - name: Setup release keystore
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$KEYSTORE_BASE64" | base64 -d > ~/.android/release.keystore
          echo "KEYSTORE_PATH=$HOME/.android/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # 沒有 Secret → 產生臨時 debug keystore（每次簽名不同）
      - name: Setup debug keystore (fallback)
        if: secrets.KEYSTORE_BASE64 == ''
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -alias androiddebugkey -keypass android \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000
          echo "KEYSTORE_PATH=$HOME/.android/debug.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android" >> $GITHUB_ENV

      - name: Write key.properties
        run: |
          cat > android/key.properties << PROPS
          storePassword=${{ env.KEYSTORE_PASSWORD }}
          keyPassword=${{ env.KEY_PASSWORD }}
          keyAlias=${{ env.KEY_ALIAS }}
          storeFile=${{ env.KEYSTORE_PATH }}
          PROPS

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: biz-card-scanner-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build summary
        run: |
          SIZE=$(du -sh build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          HAS_SECRET="${{ secrets.KEYSTORE_BASE64 != '' }}"
          echo "### APK Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Signing**: $([ "$HAS_SECRET" = "true" ] && echo 'Release keystore (可覆蓋安裝)' || echo 'Debug keystore (需重裝)')" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

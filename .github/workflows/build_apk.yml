name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Setup release keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ~/.android/release.keystore
          cat > android/key.properties << PROPS
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=$HOME/.android/release.keystore
          PROPS

      - name: Setup debug keystore (fallback)
        if: env.HAS_KEYSTORE != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -alias androiddebugkey -keypass android \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000
          cat > android/key.properties << PROPS
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          storeFile=$HOME/.android/debug.keystore
          PROPS

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: biz-card-scanner-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build summary
        run: |
          SIZE=$(du -sh build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          echo "### APK Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Signing**: ${{ env.HAS_KEYSTORE == 'true' && 'Release keystore (可覆蓋安裝)' || 'Debug keystore' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

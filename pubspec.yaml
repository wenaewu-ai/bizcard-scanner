name: biz_card_scanner
description: Cardify - AI Business Card Scanner
publish_to: 'none'
version: 1.4.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 相機
  camera: ^0.11.0
  # 圖片處理
  image_picker: ^1.1.2
  # ML Kit 文字偵測（用來判斷名片）
  google_mlkit_text_recognition: ^0.13.0
  # HTTP
  http: ^1.2.1
  # 本機儲存
  shared_preferences: ^2.2.3
  # QR
  qr_flutter: ^4.1.0
  # 分享
  share_plus: ^9.0.0
  # 檔案
  path_provider: ^2.1.3
  file_picker: ^8.0.6
  # 其他
  uuid: ^4.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
